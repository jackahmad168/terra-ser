<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Terra-ser Digital Solutions</title>
  <style>
    body {
      font-family: 'Montserrat', sans-serif;
      margin: 0;
      background-color: #fff;
      color: #333;
    }
    header {
      background-color: #000;
      color: #fff;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px 30px;
      position: sticky;
      top: 0;
      z-index: 1000;
    }
    header h1 {
      color: #ff7b00;
      font-size: 22px;
      margin: 0;
    }
    nav {
      display: flex;
      gap: 15px;
    }
    nav a {
      color: #fff;
      text-decoration: none;
      font-weight: 500;
      transition: color 0.3s;
    }
    nav a:hover {
      color: #ff7b00;
    }
    .menu-toggle {
      display: none;
      font-size: 26px;
      cursor: pointer;
    }
    .hero {
      background: linear-gradient(135deg, #ff7b00, #007bff);
      color: #fff;
      text-align: center;
      padding: 80px 20px;
      animation: fadeIn 1.5s ease-in-out;
    }
    .hero h2 {
      font-size: 32px;
      margin-bottom: 10px;
    }
    .hero p {
      font-size: 18px;
      margin-bottom: 30px;
    }
    .cta {
      background-color: #fff;
      color: #ff7b00;
      padding: 12px 25px;
      border: none;
      font-weight: bold;
      cursor: pointer;
      border-radius: 5px;
      transition: transform 0.3s;
    }
    .cta:hover {
      transform: scale(1.1);
    }
    section {
      padding: 60px 30px;
    }
    .stats {
      display: flex;
      justify-content: space-around;
      flex-wrap: wrap;
      text-align: center;
      margin-top: 40px;
    }
    .stat-box {
      background-color: #f8f8f8;
      padding: 20px;
      border-radius: 8px;
      width: 250px;
      margin: 10px;
      transition: transform 0.3s;
    }
    .stat-box:hover {
      transform: translateY(-5px);
    }
    .services {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
    }
    .service-card {
      background-color: #f8f8f8;
      padding: 20px;
      border-radius: 8px;
      text-align: center;
      transition: transform 0.3s;
    }
    .service-card:hover {
      transform: scale(1.05);
    }
    .network {
      text-align: center;
    }
    .contact {
      display: flex;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 30px;
    }
    form {
      flex: 1;
      min-width: 300px;
    }
    form input, form textarea {
      width: 100%;
      padding: 10px;
      margin: 10px 0;
      border: 1px solid #ccc;
      border-radius: 5px;
    }
    form button {
      background-color: #ff7b00;
      color: #fff;
      border: none;
      padding: 12px 25px;
      border-radius: 5px;
      cursor: pointer;
      transition: background-color 0.3s;
    }
    form button:hover {
      background-color: #e66a00;
    }
    footer {
      background-color: #000;
      color: #fff;
      text-align: center;
      padding: 20px;
      font-size: 14px;
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    /* Mobile Styles */
    @media (max-width: 768px) {
      nav {
        display: none;
        flex-direction: column;
        background-color: #000;
        position: absolute;
        top: 60px;
        right: 0;
        width: 200px;
        padding: 20px;
      }
      nav.active {
        display: flex;
      }
      .menu-toggle {
        display: block;
      }
    }
  </style>
</head>
<body>
  <header>
    <h1>Terra-ser Digital Solutions</h1>
    <span class="menu-toggle">&#9776;</span>
    <nav>
      <a href="#home">Home</a>
      <a href="#about">About Us</a>
      <a href="#services">Services</a>
      <a href="#network">Our Network</a>
      <a href="#contact">Contact Us</a>
